<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Món Quà Nhỏ Cho Cá ❤️</title>
<style>
    body {
        margin: 0;
        background: radial-gradient(circle, #0d1117, #010409); /* Màu nền tối để trái tim nổi bật */
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #f0f0f0;
        font-family: 'Poppins', sans-serif; /* Bạn có thể đổi phông chữ nếu muốn */
    }

    .heart-scene {
        position: relative;
        width: 300px;
        height: 300px;
        transform-style: preserve-3d;
        animation: rotateScene 15s infinite linear; /* Trái tim xoay nhẹ 3D */
    }

    .heart-scene:hover {
        animation-play-state: paused; /* Tạm dừng xoay khi di chuột */
    }

    .heart-scene:hover .heart {
        transform: scale(1.3); /* Trái tim lớn lên khi di chuột */
        box-shadow: 0 0 100px rgba(255, 61, 91, 0.8), 0 0 150px rgba(255, 107, 129, 0.6);
        background: radial-gradient(circle, #ff1a4a, #d40032);
    }

    .heart-scene:hover #center-text {
        opacity: 1; /* Hiển thị tên khi di chuột */
        transform: translate(-50%, -50%) translateZ(10px) scale(1);
    }

    .heart {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, #ff3d5b, #d40032);
        border-radius: 50% 50% 0 0;
        transform-origin: center bottom;
        box-shadow: 0 0 50px rgba(255, 61, 91, 0.6), 0 0 100px rgba(255, 107, 129, 0.4);
        transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        animation: pulse 1.5s infinite ease-in-out; /* Hiệu ứng "thở" */
    }

    .heart::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, #ff3d5b, #d40032);
        border-radius: 50% 50% 0 0;
        transform: translateX(-50%) rotate(-45deg);
        transform-origin: 100% 100%;
    }

    .heart::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, #ff3d5b, #d40032);
        border-radius: 50% 50% 0 0;
        transform: translateX(50%) rotate(45deg);
        transform-origin: 0 100%;
    }

    @keyframes pulse {
        0%, 100% {
            transform: scale(1) rotateX(20deg);
        }
        50% {
            transform: scale(1.1) rotateX(15deg);
        }
    }

    @keyframes rotateScene {
        0% { transform: rotateY(0deg) rotateX(0deg); }
        100% { transform: rotateY(360deg) rotateX(360deg); }
    }

    #center-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) translateZ(10px) scale(0.8);
        font-size: 60px;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f;
        pointer-events: none; /* Tránh text cản trở hiệu ứng di chuột */
        opacity: 0.7; /* Ẩn bớt để tăng sự tò mò */
        transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .glitter-particle {
        position: absolute;
        width: 3px;
        height: 3px;
        background-color: rgba(255, 255, 255, 0.9);
        border-radius: 50%;
        animation: glitter 1s infinite linear;
    }

    @keyframes glitter {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-50px) scale(0.1); opacity: 0; }
    }

</style>
</head>
<body>

    <div class="heart-scene">
        <div class="heart"></div>
        <div id="center-text">Cá</div>
        <!-- Thêm hiệu ứng lấp lánh (bạn có thể bỏ nếu thấy quá tải) -->
        <div class="glitter-particle" style="top: 20%; left: 30%; animation-delay: 0.1s;"></div>
        <div class="glitter-particle" style="top: 50%; left: 10%; animation-delay: 0.3s;"></div>
        <div class="glitter-particle" style="top: 80%; left: 40%; animation-delay: 0.5s;"></div>
        <div class="glitter-particle" style="top: 15%; left: 70%; animation-delay: 0.7s;"></div>
        <div class="glitter-particle" style="top: 60%; left: 90%; animation-delay: 0.9s;"></div>
    </div>

    <script>
        // JS để tạo thêm hiệu ứng lấp lánh một cách ngẫu nhiên
        const heartScene = document.querySelector('.heart-scene');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.classList.add('glitter-particle');
            particle.style.top = Math.random() * 100 + '%';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() + 's';
            heartScene.appendChild(particle);
        }
    </script>
</body>
</html>
